<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MT5 History Thailand</title>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial;
            text-align:center;
            margin:0;
        }

        .header{
            background:#1e1e1e;
            padding:30px;
        }

        h1{
            color:gold;
            font-size:45px;
        }

        .box{
            width:700px;
            margin:30px auto;
            background:#222;
            padding:30px;
            border-radius:20px;
        }

        button{
            background:gold;
            border:none;
            padding:15px 30px;
            font-size:20px;
            border-radius:10px;
            cursor:pointer;
        }

        table{
            width:100%;
            color:white;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #555;
            padding:15px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>MT5 History Thailand</h1>
    <p>เว็บไซต์แสดงประวัติการเทรด MT5</p>
</div>

<div class="box">

    <h2>ผลกำไรรวม</h2>

    <h1>$12,500</h1>

    <button>เข้าสู่ระบบ</button>

    <table>
        <tr>
            <th>วันที่</th>
            <th>กำไร</th>
        </tr>

        <tr>
            <td>10/07/2026</td>
            <td>+350 USD</td>
        </tr>

        <tr>
            <td>11/07/2026</td>
            <td>+420 USD</td>
        </tr>

        <tr>
            <td>12/07/2026</td>
            <td>+510 USD</td>
        </tr>

    </table>

</div>

</body>
</html>
